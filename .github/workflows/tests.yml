name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  behave:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS files
        run: git lfs pull

      - name: Run Behave suite (Docker harness)
        run: ./scripts/run_behave_tests.sh
